name: Feature Request
description: Sugiere una nueva idea para este proyecto.
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: ¿Cuál es tu sugerencia?
      placeholder: Me gustaría que la app hiciera...
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: ¿Por qué esto es útil?
      placeholder: Esto ayudaría a...
